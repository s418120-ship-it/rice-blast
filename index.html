<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>孑孓偵查網頁</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <header class="hero">
      <div>
        <h1>孑孓偵查網頁</h1>
        <p>支援上傳圖片辨識與手機後鏡頭即時辨識，會框出孑孓、顯示信心值與統計數量。</p>
      </div>
      <div id="modelStatus" class="status">模型載入中...</div>
    </header>

    <section class="panel controls">
      <label class="fileButton">
        上傳圖片辨識
        <input id="imageInput" type="file" accept="image/*" />
      </label>

      <button id="cameraButton" type="button">開啟手機後鏡頭</button>
      <button id="stopCameraButton" type="button" disabled>停止鏡頭</button>

      <label class="sliderLabel">
        信心值門檻
        <input id="confSlider" type="range" min="0.1" max="0.9" step="0.05" value="0.25" />
        <span id="confValue">0.25</span>
      </label>
    </section>

    <section class="workspace">
      <div class="canvasWrap panel">
        <video id="video" playsinline muted></video>
        <img id="sourceImage" alt="上傳的圖片" />
        <canvas id="canvas"></canvas>
      </div>

      <aside class="panel sidePanel">
        <h2>辨識結果</h2>
        <div id="summary" class="summary">尚未辨識</div>
        <div id="counts" class="counts"></div>
        <div id="detections" class="detections"></div>
      </aside>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
